<!DOCTYPE html>
<html>
<head>
    <title>Quản lý văn bản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
        }

        /* nền ảnh */
        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("/static/giang-duong-utt.jpg") no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* lớp mờ */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .sidebar {
            height: 100vh;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            margin: 10px 0;
            text-decoration: none;
        }

        .sidebar a:hover {
            color: #0d6efd;
        }

        .content {
            padding: 20px;
            color: white;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container-fluid">
    <div class="row">

        <!-- sidebar -->
        <div class="col-2 sidebar">
            <h4>📂 QL Văn Bản</h4>
            <hr>
            <a href="/dashboard">🏠 Trang chủ</a>
            <a href="/logout">🚪 Đăng xuất</a>
        </div>

        <!-- content -->
        <div class="col-10 content">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

</body>
</html>
