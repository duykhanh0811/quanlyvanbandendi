<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
    function showFields(role){
        if(role == "student"){
            document.getElementById("student").style.display = "block";
            document.getElementById("staff").style.display = "none";
        } else {
            document.getElementById("student").style.display = "none";
            document.getElementById("staff").style.display = "block";
        }
    }
    </script>

    <style>
        body {
            margin: 0;
        }

        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("/static/giang-duong-utt.jpg") no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }
    </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container mt-5">
    <div class="card p-4 shadow mx-auto" style="max-width: 500px;">
        <h3 class="text-center mb-3">📝 Đăng ký</h3>

        <form method="post">
            <input class="form-control mb-2" name="username" placeholder="Username">
            <input class="form-control mb-2" type="password" name="password" placeholder="Password">

            <select class="form-control mb-2" name="role" onchange="showFields(this.value)">
                <option value="student">Sinh viên</option>
                <option value="staff">Văn thư</option>
            </select>

            <!-- sinh viên -->
            <div id="student">
                <input class="form-control mb-2" name="student_id" placeholder="Mã sinh viên">
                <input class="form-control mb-2" name="class" placeholder="Lớp">
            </div>

            <!-- văn thư -->
            <div id="staff" style="display:none;">
                <input class="form-control mb-2" name="department_id" placeholder="ID bộ phận">
                <input class="form-control mb-2" name="position" placeholder="Chức vụ">
            </div>

            <button class="btn btn-success w-100">Đăng ký</button>
        </form>

        <a href="/" class="text-center mt-3 d-block">Quay lại</a>
    </div>
</div>

</body>
</html>
